<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v14 | Intelligent Coach</title>
    <style>
        :root {
            --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e; --text: #f4f4f5;
            --blue: #3b82f6; --red: #ef4444; --green: #10b981; --amber: #f59e0b;
            --muted: #71717a; --border: #27272a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        nav {
            display: flex; justify-content: space-around;
            background: var(--card); padding: 12px 0;
            border-top: 1px solid var(--border);
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
        }
        nav div {
            color: var(--muted); font-size: 0.75rem; text-align: center;
            flex: 1; cursor: pointer; transition: color 0.2s;
        }
        nav div.active { color: var(--primary); font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; } .page.active { display: block; }
        h1 { text-align: center; font-size: 1.1rem; letter-spacing: 2px; margin: 10px 0 20px; }
        .card {
            background: var(--card); border-radius: 20px;
            padding: 15px; margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        label {
            display: block; font-size: 0.75rem;
            color: var(--primary); margin-bottom: 8px; font-weight: bold;
        }
        input, textarea, select {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 12px; border-radius: 12px; color: white;
            margin-bottom: 10px; font-family: inherit; font-size: 0.9rem;
        }
        textarea { resize: vertical; min-height: 44px; }
        .btn {
            border: none; padding: 10px 14px; border-radius: 12px;
            color: white; cursor: pointer; font-weight: bold; font-size: 0.85rem;
        }
        .btn-primary { background: var(--primary); }
        .btn-blue { background: var(--blue); }
        .btn-icon {
            background: var(--border); border: none; padding: 12px;
            border-radius: 12px; color: white; font-size: 1.2rem; cursor: pointer;
        }
        .btn-icon.recording {
            background: var(--red); box-shadow: 0 0 15px var(--red);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); }
        }
        .input-row { display: flex; gap: 8px; align-items: flex-start; }
        .input-row input, .input-row textarea { margin-bottom: 0; }
        .chat-container {
            margin-top: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .msg {
            max-width: 90%; padding: 10px 12px; border-radius: 15px;
            font-size: 0.85rem; line-height: 1.6;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .user {
            align-self: flex-start; background: var(--border);
            border-right: 4px solid var(--blue);
        }
        .ai {
            align-self: flex-end; background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--primary); text-align: right;
        }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.7rem; background: var(--green); color: white; margin-bottom: 10px;
        }
        .task-item {
            display: flex; align-items: center; gap: 10px;
            background: #000; padding: 10px 12px; border-radius: 12px;
            margin-bottom: 6px; border: 1px solid var(--border);
        }
        .task-item.done { opacity: 0.5; }
        .task-item.done .task-text { text-decoration: line-through; }
        .task-checkbox {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
        }
        .task-checkbox.checked {
            background: var(--green); border-color: var(--green); color: white;
        }
        .task-text { flex: 1; font-size: 0.85rem; }
        .task-priority { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
        .priority-high { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .priority-medium { background: rgba(245, 158, 11, 0.2); color: var(--amber); }
        .priority-low { background: rgba(16, 185, 129, 0.2); color: var(--green); }
        .task-delete {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 1rem; padding: 4px;
        }
        .empty-state {
            font-size: 0.8rem; color: var(--muted);
            text-align: center; padding: 15px 0;
        }
        .summary-text { font-size: 0.85rem; color: #d4d4d8; line-height: 1.6; }
        .mood-indicator {
            font-size: 0.75rem; color: var(--muted); margin-top: 8px;
        }
        .clear-tasks-btn {
            background: none; border: 1px dashed var(--border); color: var(--muted);
            width: 100%; padding: 8px; border-radius: 10px; margin-top: 8px;
            cursor: pointer; font-size: 0.75rem;
        }
        .stats-row {
            display: flex; justify-content: space-around;
            font-size: 0.75rem; color: var(--muted); margin-top: 10px;
        }
        .stat-num { color: var(--text); font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="content">
    <!-- ============ صفحه اصلی ============ -->
    <div id="page-home" class="page active">
        <h1>SYCA CENTER</h1>

        <!-- بخش ۱: تحلیل وضعیت -->
        <div class="card" style="border-color: var(--green);">
            <div class="status-badge">📊 تحلیل وضعیت لحظه‌ای</div>
            <div id="strategic-summary" class="summary-text">در انتظار اولین تعامل...</div>
            <div id="mood-indicator" class="mood-indicator"></div>
        </div>

        <!-- بخش ۲: کارهای پیشنهادی -->
        <div class="card" style="border-color: var(--amber);">
            <label style="color:var(--amber)">🎯 کارهای پیشنهادی امروز</label>
            <div id="home-task-list"></div>
            <div class="stats-row" id="task-stats"></div>
            <button class="clear-tasks-btn" onclick="clearCompletedTasks()">🧹 پاک کردن کارهای انجام‌شده</button>
        </div>

        <!-- بخش ۳: گزارش سریع -->
        <div class="card" style="border-color: var(--blue);">
            <label style="color:var(--blue)">🚀 گزارش سریع</label>
            <div class="input-row">
                <input type="text" id="status-input" placeholder="الان کجا و مشغول چه کاری؟">
                <button id="mic-quick" class="btn-icon" onclick="toggleMic('status-input', 'quick')">🎤</button>
                <button class="btn btn-blue" onclick="handleAI('quick')">ثبت</button>
            </div>
            <div id="quick-chat-log" class="chat-container"></div>
        </div>

        <!-- بخش ۴: میز مشورت -->
        <div class="card">
            <label>🧠 میز مشورت</label>
            <div class="input-row">
                <textarea id="chat-input" rows="2" placeholder="یه گفتگوی عمیق‌تر..."></textarea>
                <button id="mic-deep" class="btn-icon" onclick="toggleMic('chat-input', 'deep')">🎤</button>
                <button class="btn btn-primary" onclick="handleAI('deep')">ارسال</button>
            </div>
            <div id="deep-chat-log" class="chat-container"></div>
        </div>
    </div>

    <!-- ============ صفحه استراتژی ============ -->
    <div id="page-strategy" class="page">
        <h1>🎯 مدیریت اهداف</h1>
        <div class="card">
            <label>➕ افزودن کار جدید</label>
            <input type="text" id="new-task-input" placeholder="عنوان کار...">
            <select id="new-task-priority">
                <option value="medium">اولویت: متوسط</option>
                <option value="high">اولویت: بالا</option>
                <option value="low">اولویت: پایین</option>
            </select>
            <button class="btn btn-primary" style="width:100%;" onclick="addManualTask()">افزودن</button>
        </div>
        <div id="lt-list-detailed"></div>
    </div>

    <!-- ============ صفحه تنظیمات ============ -->
    <div id="page-settings" class="page">
        <h1>⚙️ تنظیمات</h1>
        <div class="card">
            <label>🔑 Gemini API Key</label>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <label>⏰ بازه بررسی (ساعت)</label>
            <select id="interval-check">
                <option value="1">هر ۱ ساعت</option>
                <option value="2" selected>هر ۲ ساعت</option>
                <option value="4">هر ۴ ساعت</option>
            </select>
            <label>📊 بازه فیدبک (ساعت)</label>
            <select id="interval-feedback">
                <option value="2">هر ۲ ساعت</option>
                <option value="4" selected>هر ۴ ساعت</option>
                <option value="8">هر ۸ ساعت</option>
            </select>
            <label>🌙 ساعت مرور شبانه</label>
            <input type="time" id="nightly-review-time" value="23:30">
            <button class="btn btn-primary" style="width:100%; padding:15px;" onclick="saveSettings()">
                💾 ذخیره تنظیمات
            </button>
            <button onclick="clearAll()" style="color:var(--red); background:none; border:none; width:100%; margin-top:20px; cursor:pointer;">
                🗑️ پاکسازی کامل داده‌ها
            </button>
        </div>
        <div class="card">
            <label>📚 درباره</label>
            <div style="font-size: 0.8rem; color: var(--muted); line-height: 1.7;">
                Syca v14 — مربی هوشمند شخصی شما<br>
                مبتنی بر Gemini API<br>
                داده‌ها در مرورگر شما (localStorage) ذخیره می‌شوند.
            </div>
        </div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="nav-home" class="active">🏠<br>امروز</div>
    <div onclick="showPage('strategy')" id="nav-strategy">🎯<br>استراتژی</div>
    <div onclick="showPage('settings')" id="nav-settings">⚙️<br>تنظیمات</div>
</nav>

<script>
// ============ دیتابیس ============
let db = JSON.parse(localStorage.getItem('syca_db')) || {
    tasks: [],
    logs: [],
    chatHistory: { quick: [], deep: [] },
    settings: { key: "", checkInt: "2", feedInt: "4", nightTime: "23:30" },
    lastSummary: "",
    lastMood: ""
};

let recognition = null;
let currentRecordingType = null;

// ============ ابزارهای کمکی ============
function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function saveDB() {
    localStorage.setItem('syca_db', JSON.stringify(db));
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// ============ ناوبری صفحات ============
function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.getElementById('nav-' + p).classList.add('active');
    if (p === 'settings') loadSettings();
    render();
}

// ============ تنظیمات ============
function loadSettings() {
    document.getElementById('api-key-input').value = db.settings.key || "";
    document.getElementById('interval-check').value = db.settings.checkInt || "2";
    document.getElementById('interval-feedback').value = db.settings.feedInt || "4";
    document.getElementById('nightly-review-time').value = db.settings.nightTime || "23:30";
}

function saveSettings() {
    db.settings.key = document.getElementById('api-key-input').value.trim();
    db.settings.checkInt = document.getElementById('interval-check').value;
    db.settings.feedInt = document.getElementById('interval-feedback').value;
    db.settings.nightTime = document.getElementById('nightly-review-time').value;
    saveDB();
    alert("✅ تنظیمات ذخیره شد.");
}

// ============ میکروفون (نسخه ساده مثل جمینای v13) ============
function toggleMic(inputId, type) {
    const micBtn = document.getElementById('mic-' + type);

    if (recognition && currentRecordingType === type) {
        recognition.stop();
        return;
    }

    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return alert("⚠️ مرورگر شما از تشخیص گفتار پشتیبانی نمی‌کند.");

    recognition = new SpeechRec();
    recognition.lang = 'fa-IR';
    recognition.continuous = true;
    // interimResults را ست نمی‌کنیم → پیش‌فرض false → فقط نتایج نهایی
    currentRecordingType = type;

    recognition.onstart = () => micBtn.classList.add('recording');

    recognition.onresult = (e) => {
        let t = "";
        for (let i = 0; i < e.results.length; i++) {
            t += e.results[i][0].transcript;
        }
        document.getElementById(inputId).value = t;
    };

    recognition.onerror = (e) => {
        console.error("Speech error:", e.error);
        micBtn.classList.remove('recording');
        recognition = null;
        currentRecordingType = null;
    };

    recognition.onend = () => {
        micBtn.classList.remove('recording');
        const wasType = currentRecordingType;
        recognition = null;
        currentRecordingType = null;
        if (wasType && document.getElementById(inputId).value.trim()) {
            setTimeout(() => handleAI(wasType), 500);
        }
    };

    recognition.start();
}

// ============ موتور هوشمند Gemini ============
async function handleAI(type) {
    const inputId = type === 'quick' ? 'status-input' : 'chat-input';
    const userText = document.getElementById(inputId).value.trim();

    if (!userText) return;
    if (!db.settings.key) {
        return addMessage(type, 'ai', "⚠️ ابتدا Gemini API Key را در تنظیمات وارد و ذخیره کنید.");
    }

    const timestamp = new Date().toLocaleTimeString('it-IT');
    db.logs.push({ time: timestamp, text: userText });
    if (db.logs.length > 30) db.logs = db.logs.slice(-30);

    addMessage(type, 'user', `(${timestamp}) ${userText}`);
    document.getElementById(inputId).value = "";

    // نشان دادن "در حال فکر کردن"
    addMessage(type, 'ai', '⏳ در حال تحلیل...');

    const models = [
        'gemini-flash-latest',
        'gemini-3.1-flash-lite',
        'gemini-2.5-flash-lite',
        'gemini-2.5-flash'
    ];

    const recentLogs = db.logs.slice(-5).map(l => `[${l.time}] ${l.text}`).join('\n');
    const currentTasks = db.tasks.filter(t => !t.done).map(t => `- ${t.n}`).join('\n') || 'هیچ';

    const systemPrompt = `تو یک مربی شخصی هوشمند به نام "سیکا" هستی. به زبان فارسی، گرم، صمیمی و کاربردی پاسخ بده.

داده‌های کاربر:
- نوع پیام: ${type === 'quick' ? 'گزارش سریع وضعیت' : 'مشورت عمیق'}
- ۵ گزارش اخیر:
${recentLogs}
- کارهای فعال:
${currentTasks}

پیام فعلی کاربر: "${userText}"

وظایف تو:
1. یک پاسخ دوستانه و مفید بده (2-4 جمله، کامل و واضح)
2. اگر کاربر کاری رو ذکر کرد که باید انجام بده، اون رو به عنوان task استخراج کن
3. وضعیت کلی روحی/شرایطی کاربر رو در یک کلمه ارزیابی کن

❗ حتماً پاسخ رو فقط و فقط در قالب JSON معتبر زیر برگردون، بدون هیچ متن اضافه یا markdown:

{
  "reply": "پاسخ گرم و کامل به کاربر در 2-4 جمله",
  "summary": "خلاصه وضعیت کاربر در یک جمله کوتاه",
  "mood": "یک کلمه: مثل آرام، پرانرژی، خسته، متمرکز، پراسترس",
  "newTasks": [
    { "title": "عنوان کار", "priority": "high|medium|low" }
  ]
}

اگر کار جدیدی نیست، newTasks رو خالی [] بذار.`;

    let lastError = "";
    let success = false;

    for (const m of models) {
        if (success) break;
        try {
            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent`,
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': db.settings.key
                    },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: systemPrompt }] }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 1024,
                            responseMimeType: "application/json"
                        }
                    })
                }
            );

            const data = await response.json();

            if (!response.ok) {
                lastError = data?.error?.message || `HTTP ${response.status}`;
                console.error(`Model ${m} failed:`, data);
                continue;
            }

            const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!rawText) {
                lastError = "پاسخ خالی";
                continue;
            }

            // پارس JSON
            let parsed;
            try {
                // حذف markdown code fences اگر وجود داشت
                const cleaned = rawText.replace(/```json|```/g, '').trim();
                parsed = JSON.parse(cleaned);
            } catch (parseErr) {
                console.error("Parse error:", parseErr, "Raw:", rawText);
                // اگر JSON پارس نشد، خود متن خام رو به عنوان reply نشون بده
                parsed = { reply: rawText, summary: "", mood: "", newTasks: [] };
            }

            // حذف پیام "در حال تحلیل" و افزودن پاسخ واقعی
            db.chatHistory[type].pop();

            const reply = parsed.reply || "پاسخ دریافت شد.";
            addMessage(type, 'ai', reply);
            speak(reply);

            // به‌روزرسانی summary و mood
            if (parsed.summary) db.lastSummary = parsed.summary;
            if (parsed.mood) db.lastMood = parsed.mood;

            // افزودن task های جدید
            if (Array.isArray(parsed.newTasks) && parsed.newTasks.length > 0) {
                parsed.newTasks.forEach(t => {
                    if (t && t.title) {
                        db.tasks.push({
                            id: generateId(),
                            n: t.title,
                            p: t.priority || 'medium',
                            done: false,
                            createdAt: new Date().toISOString()
                        });
                    }
                });
            }

            saveDB();
            render();
            success = true;
            return;

        } catch (e) {
            lastError = e.message;
            console.error(`Network error with ${m}:`, e);
        }
    }

    if (!success) {
        // حذف پیام "در حال تحلیل"
        db.chatHistory[type].pop();
        addMessage(type, 'ai', `⚠️ خطا در اتصال:\n${lastError}`);
    }
}

// ============ مدیریت پیام‌ها ============
function addMessage(type, role, text) {
    db.chatHistory[type].push({ role, text });
    if (db.chatHistory[type].length > 6) db.chatHistory[type].shift();
    saveDB();
    render();
}

function speak(t) {
    try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(t);
        utterance.lang = 'fa-IR';
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    } catch (e) {
        console.error("TTS error:", e);
    }
}

// ============ مدیریت Task ها ============
function toggleTask(id) {
    const task = db.tasks.find(t => t.id === id);
    if (task) {
        task.done = !task.done;
        if (task.done) task.completedAt = new Date().toISOString();
        saveDB();
        render();
    }
}

function deleteTask(id) {
    db.tasks = db.tasks.filter(t => t.id !== id);
    saveDB();
    render();
}

function clearCompletedTasks() {
    const count = db.tasks.filter(t => t.done).length;
    if (count === 0) return alert("کار انجام‌شده‌ای وجود ندارد.");
    if (confirm(`${count} کار انجام‌شده پاک شود؟`)) {
        db.tasks = db.tasks.filter(t => !t.done);
        saveDB();
        render();
    }
}

function addManualTask() {
    const input = document.getElementById('new-task-input');
    const priority = document.getElementById('new-task-priority').value;
    const title = input.value.trim();
    if (!title) return;
    db.tasks.push({
        id: generateId(),
        n: title,
        p: priority,
        done: false,
        createdAt: new Date().toISOString()
    });
    input.value = "";
    saveDB();
    render();
}

// ============ Render ============
function renderTaskItem(t, showDelete = true) {
    const priorityClass = `priority-${t.p || 'medium'}`;
    const priorityLabel = { high: 'بالا', medium: 'متوسط', low: 'پایین' }[t.p] || 'متوسط';
    return `
        <div class="task-item ${t.done ? 'done' : ''}">
            <div class="task-checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask('${t.id}')">
                ${t.done ? '✓' : ''}
            </div>
            <div class="task-text">${escapeHtml(t.n)}</div>
            <span class="task-priority ${priorityClass}">${priorityLabel}</span>
            ${showDelete ? `<button class="task-delete" onclick="deleteTask('${t.id}')">✕</button>` : ''}
        </div>
    `;
}

function render() {
    // چت‌ها
    ['quick', 'deep'].forEach(type => {
        const log = document.getElementById(type + '-chat-log');
        if (log) {
            log.innerHTML = db.chatHistory[type]
                .map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${escapeHtml(m.text)}</div>`)
                .join('');
            log.scrollTop = log.scrollHeight;
        }
    });

    // خلاصه و mood
    const summaryEl = document.getElementById('strategic-summary');
    if (summaryEl) {
        summaryEl.innerText = db.lastSummary || "منتظر گزارش شما هستم...";
    }
    const moodEl = document.getElementById('mood-indicator');
    if (moodEl) {
        moodEl.innerText = db.lastMood ? `🎭 حال و احوال: ${db.lastMood}` : "";
    }

    // لیست task ها در صفحه اصلی (فقط فعال یا اخیر)
    const homeTasks = document.getElementById('home-task-list');
    if (homeTasks) {
        const activeTasks = db.tasks.filter(t => !t.done);
        const completedToday = db.tasks.filter(t => {
            if (!t.done || !t.completedAt) return false;
            const today = new Date().toDateString();
            return new Date(t.completedAt).toDateString() === today;
        });
        const visibleTasks = [...activeTasks, ...completedToday];

        if (visibleTasks.length === 0) {
            homeTasks.innerHTML = `<div class="empty-state">هنوز کاری ثبت نشده.<br>یه گزارش بدید تا سیکا براتون پیشنهاد بده.</div>`;
        } else {
            // اولویت‌بندی: high → medium → low
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            visibleTasks.sort((a, b) => {
                if (a.done !== b.done) return a.done ? 1 : -1;
                return (priorityOrder[a.p] || 1) - (priorityOrder[b.p] || 1);
            });
            homeTasks.innerHTML = visibleTasks.map(t => renderTaskItem(t, false)).join('');
        }

        // آمار
        const statsEl = document.getElementById('task-stats');
        if (statsEl) {
            const total = db.tasks.length;
            const done = db.tasks.filter(t => t.done).length;
            const active = total - done;
            statsEl.innerHTML = `
                <div><span class="stat-num">${active}</span><br>فعال</div>
                <div><span class="stat-num" style="color:var(--green)">${done}</span><br>انجام‌شده</div>
                <div><span class="stat-num">${total}</span><br>کل</div>
            `;
        }
    }

    // صفحه استراتژی - همه task ها با امکان حذف
    const lt = document.getElementById('lt-list-detailed');
    if (lt) {
        if (db.tasks.length === 0) {
            lt.innerHTML = `<div class="card"><div class="empty-state">هنوز کاری ثبت نشده.</div></div>`;
        } else {
            const sorted = [...db.tasks].sort((a, b) => {
                if (a.done !== b.done) return a.done ? 1 : -1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });
            lt.innerHTML = `<div class="card">${sorted.map(t => renderTaskItem(t, true)).join('')}</div>`;
        }
    }
}

// ============ پاکسازی ============
function clearAll() {
    if (confirm("⚠️ تمام داده‌ها (تنظیمات، گفتگوها، کارها) پاک شوند؟")) {
        localStorage.clear();
        location.reload();
    }
}

// ============ شروع ============
window.onload = () => {
    render();
    if (db.settings.key) loadSettings();
};
</script>
