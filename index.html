<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دستیار هوشمند | AI Assistant</title>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --accent: #8b5cf6; --text: #fafafa; --dim: #a1a1aa; --border: #27272a;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 15px; line-height: 1.6;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: var(--card); border-radius: 16px;
            padding: 18px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        h2 { font-size: 1.1rem; margin-top: 0; color: var(--accent); display: flex; justify-content: space-between; }
        input, textarea, select {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #09090b; border: 1px solid #3f3f46;
            border-radius: 8px; color: white; font-size: 0.9rem;
        }
        button {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .task-item {
            background: #09090b; padding: 10px; border-radius: 8px;
            margin-bottom: 8px; border-right: 3px solid var(--accent); font-size: 0.85rem;
        }
        .hidden { display: none; }
        #ai-response { font-size: 0.95rem; white-space: pre-wrap; padding: 10px 0; color: #d1d1d6; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-section" class="card">
        <h2>تنظیمات اتصال</h2>
        <input type="password" id="api-key" placeholder="Gemini API Key را وارد کنید...">
        <button onclick="saveKey()">ذخیره و ورود به اپلیکیشن</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="card">
            <h2>اهداف بلندمدت <span>+</span></h2>
            <input type="text" id="lt-task-name" placeholder="نام هدف (مثلا: پایان‌نامه)">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="lt-task-prob" placeholder="شانس موفقیت (%)">
                <input type="number" id="lt-task-gain" placeholder="میزان سود (۱-۱۰)">
            </div>
            <button style="background: #27272a;" onclick="addLongTermTask()">اضافه کردن هدف</button>
            <div id="lt-tasks-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>وضعیت فعلی (Check-in)</h2>
            <textarea id="user-input" rows="2" placeholder="کجایی؟ چیکار می‌کنی؟ (مثلا: تو اتوبوسم، دارم میرم دانشگاه)"></textarea>
            <button onclick="askAI()">تحلیل و پیشنهاد کار بعدی</button>
            <div id="ai-response">منتظر ورودی شما هستم...</div>
        </div>
    </div>
</div>

<script>
    // حافظه اپلیکیشن
    let appData = JSON.parse(localStorage.getItem('app_data')) || {
        longTermTasks: [],
        dailyLogs: []
    };

    window.onload = () => {
        if (localStorage.getItem('gemini_key')) {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            renderTasks();
        }
    };

    function saveKey() {
        const key = document.getElementById('api-key').value;
        if (key.length > 20) {
            localStorage.setItem('gemini_key', key);
            location.reload();
        }
    }

    function addLongTermTask() {
        const name = document.getElementById('lt-task-name').value;
        const prob = document.getElementById('lt-task-prob').value;
        const gain = document.getElementById('lt-task-gain').value;

        if (!name) return;

        appData.longTermTasks.push({ name, prob, gain, id: Date.now() });
        saveAndRender();
        document.getElementById('lt-task-name').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('app_data', JSON.stringify(appData));
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('lt-tasks-list');
        list.innerHTML = appData.longTermTasks.map(t => `
            <div class="task-item">
                <b>${t.name}</b> | سود: ${t.gain} | احتمال موفقیت: ${t.prob}%
            </div>
        `).join('');
    }

    async function askAI() {
        const input = document.getElementById('user-input').value;
        const apiKey = localStorage.getItem('gemini_key');
        const responseDiv = document.getElementById('ai-response');
        
        if (!input) return;
        responseDiv.innerText = "در حال تحلیل داده‌ها و همبستگی‌ها...";

        // آماده‌سازی داده‌های بلندمدت برای هوش مصنوعی
        const tasksContext = JSON.stringify(appData.longTermTasks);

        const prompt = `
        کاربر در وضعیت فعلی است: "${input}"
        لیست اهداف بلندمدت او: ${tasksContext}
        
        وظیفه تو:
        ۱. همبستگی (Correlation) بین وضعیت فعلی و اهداف بلندمدت را پیدا کن.
        ۲. بر اساس میزان سود و شانس موفقیت اهداف، اولویت‌بندی کن.
        ۳. دقیقا بگو الان انجام دادن کدام کار (مرتبط با گوشی یا محیط فعلی) بیشترین بهره‌وری را دارد.
        پاسخ را بسیار دوستانه و کوتاه به فارسی بنویس.
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            responseDiv.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            responseDiv.innerText = "خطا در اتصال. کلید API را بررسی کنید.";
        }
    }
</script>

</body>
</html>
