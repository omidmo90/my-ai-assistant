<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v2.0 | Personal Synergy Assistant</title>
    <style>
        :root {
            --primary: #8b5cf6; --secondary: #ec4899; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f4f4f5; --text-dim: #a1a1aa; --accent-blue: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #050505);
            background-attachment: fixed; color: var(--text); margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; padding-bottom: 50px; }

        .card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        h2 { 
            font-size: 1.1rem; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px;
            background: linear-gradient(to left, var(--primary), var(--accent-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 14px; color: white; font-family: inherit; margin-bottom: 12px;
            box-sizing: border-box; transition: 0.3s;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent-blue));
            color: white; font-weight: 800; cursor: pointer; box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .task-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 15px; margin-bottom: 12px;
        }

        #ai-response {
            line-height: 1.8; color: #e4e4e7; font-size: 0.95rem;
            padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; margin-top: 15px; border-right: 3px solid var(--secondary);
        }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 25px;">
        <h1 style="margin:0; letter-spacing: 4px; font-weight: 900;">SYCA</h1>
        <div style="font-size: 0.7rem; color: var(--text-dim);">PRO EDITION v2.0</div>
    </div>

    <div id="setup-section" class="card">
        <h2>🗝️ پیکربندی اولیه</h2>
        <input type="password" id="api-key" placeholder="Google Gemini API Key...">
        <button class="btn-main" onclick="saveKey()">فعالسازی سایکا</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="card">
            <h2>🎯 اهداف استراتژیک</h2>
            <input type="text" id="lt-name" placeholder="مثلاً: پروژه پایانی">
            <div class="settings-grid">
                <input type="number" id="lt-prob" placeholder="شانس %">
                <input type="number" id="lt-gain" placeholder="سود ۱-۱۰">
            </div>
            <button onclick="addLT()" style="background:var(--glass); border:1px dashed var(--text-dim); color:white; width:100%; padding:10px; border-radius:12px; cursor:pointer;">+ افزودن هدف</button>
            <div id="lt-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>🧠 تحلیل لحظه‌ای</h2>
            <textarea id="user-input" rows="3" placeholder="کجا هستی؟ چه حس و وضعیتی داری؟"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="askSyca()">تحلیل و پیشنهاد</button>
                <button onclick="startVoice()" style="background:var(--glass); border:none; padding:15px; border-radius:18px; cursor:pointer; font-size:1.2rem;">🎤</button>
            </div>
            <div id="ai-response">سایکا آماده شنیدن است...</div>
        </div>

        <div class="card">
            <h2>⚙️ زمان‌بندی یادآور</h2>
            <div class="settings-grid">
                <div>
                    <label style="font-size:0.7rem; color:var(--text-dim)">شروع فعالیت</label>
                    <input type="time" id="start-time" value="08:00">
                </div>
                <div>
                    <label style="font-size:0.7rem; color:var(--text-dim)">پایان فعالیت</label>
                    <input type="time" id="end-time" value="22:00">
                </div>
            </div>
            <label style="font-size:0.7rem; color:var(--text-dim)">فاصله تکرار (ساعت)</label>
            <select id="interval-hour">
                <option value="1">هر ۱ ساعت</option>
                <option value="2" selected>هر ۲ ساعت</option>
                <option value="4">هر ۴ ساعت</option>
            </select>
            <button onclick="requestNotificationPermission()" style="background:var(--glass); border:1px solid var(--primary); color:white; width:100%; padding:12px; border-radius:15px; margin-top:10px; cursor:pointer;">به‌روزرسانی سیستم یادآور</button>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('syca_db')) || { tasks: [], logs: [], settings: { start: "08:00", end: "22:00", interval: 2 } };
    let reminderTimer = null;

    window.onload = () => {
        if (localStorage.getItem('gemini_key')) {
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            // لود تنظیمات ذخیره شده
            document.getElementById('start-time').value = db.settings.start;
            document.getElementById('end-time').value = db.settings.end;
            document.getElementById('interval-hour').value = db.settings.interval;
            render();
            if (Notification.permission === "granted") startReminderLogic();
        }
    };

    function saveKey() {
        const k = document.getElementById('api-key').value;
        if(k.length > 20) { localStorage.setItem('gemini_key', k); location.reload(); }
    }

    function addLT() {
        const n = document.getElementById('lt-name').value;
        const p = document.getElementById('lt-prob').value;
        const g = document.getElementById('lt-gain').value;
        if(!n) return;
        db.tasks.push({n, p, g, id: Date.now()});
        save();
        document.getElementById('lt-name').value = '';
    }

    function save() {
        localStorage.setItem('syca_db', JSON.stringify(db));
        render();
    }

    function render() {
        document.getElementById('lt-list').innerHTML = db.tasks.map(t => `
            <div class="task-card">
                <div style="display:flex; justify-content:space-between; font-size:0.9rem">
                    <span>${t.n}</span>
                    <span style="color:var(--primary)">${t.g}/10</span>
                </div>
                <div style="height:4px; width:100%; background:rgba(255,255,255,0.1); border-radius:10px; margin-top:8px;">
                    <div style="height:100%; width:${t.p}%; background:var(--primary); border-radius:10px;"></div>
                </div>
            </div>
        `).join('');
    }

    // منطق نوتیفیکیشن و زمان‌بندی
    function requestNotificationPermission() {
        db.settings.start = document.getElementById('start-time').value;
        db.settings.end = document.getElementById('end-time').value;
        db.settings.interval = document.getElementById('interval-hour').value;
        save();

        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                startReminderLogic();
                alert("تنظیمات ذخیره شد و یادآور فعال گشت.");
            }
        });
    }

    function startReminderLogic() {
        if(reminderTimer) clearInterval(reminderTimer);
        const ms = db.settings.interval * 3600000;
        reminderTimer = setInterval(checkAndNotify, ms);
    }

    function checkAndNotify() {
        const now = new Date();
        const currentTime = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        
        if (currentTime >= db.settings.start && currentTime <= db.settings.end) {
            new Notification("سایکا: زمان بررسی وضعیت", {
                body: "الان کجایی؟ چقدر به اهدافت نزدیک شدی؟",
                icon: "https://cdn-icons-png.flaticon.com/512/4712/4712139.png"
            });
        }
    }

    // هوش مصنوعی و وویس
    async function askSyca() {
        const input = document.getElementById('user-input').value;
        const respDiv = document.getElementById('ai-response');
        if(!input) return;

        respDiv.classList.add('pulse');
        respDiv.innerText = "در حال محاسبه همبستگی‌های محیطی...";

        const prompt = `Act as Syca. User context: ${input}. Long-term goals: ${JSON.stringify(db.tasks)}. 
        Find synergy between context and goals. Suggest top actions in Persian. Very brief and actionable.`;

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${localStorage.getItem('gemini_key')}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            respDiv.classList.remove('pulse');
            respDiv.innerText = d.candidates[0].content.parts[0].text;
        } catch(e) { respDiv.innerText = "خطا در ارتباط با مغز سایکا."; }
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fa-IR';
        recognition.onresult = (e) => {
            document.getElementById('user-input').value = e.results[0][0].transcript;
            askSyca();
        };
        recognition.start();
    }
</script>
</body>
</html>
