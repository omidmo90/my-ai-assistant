<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v5.0 | Complete Edition</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e; --text: #f4f4f5; --blue: #3b82f6; --user-msg: #27272a; --ai-bg: rgba(139, 92, 246, 0.1); }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        nav { display: flex; justify-content: space-around; background: var(--card); padding: 12px 0; border-top: 1px solid #27272a; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        nav div { color: #71717a; font-size: 0.75rem; text-align: center; cursor: pointer; }
        nav div.active { color: var(--primary); font-weight: bold; }

        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; } .page.active { display: block; }
        
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #27272a; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #27272a; padding: 12px; border-radius: 12px; color: white; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .btn-icon { background: #27272a; border: none; padding: 12px; border-radius: 12px; cursor: pointer; color: white; font-size: 1.1rem; }
        
        /* Chat Styles */
        .chat-container { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; padding: 5px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 0.85rem; line-height: 1.5; position: relative; }
        .user { align-self: flex-start; background: var(--user-msg); border-right: 4px solid var(--blue); color: #fff; }
        .ai { align-self: flex-end; background: var(--ai-bg); border-left: 4px solid var(--primary); color: var(--primary); text-align: right; }
        
        .section-label { font-size: 0.75rem; color: var(--primary); font-weight: bold; margin-bottom: 8px; display: block; }
        .task-item { padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border-right: 3px solid var(--blue); font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="content">
    <div id="page-home" class="page active">
        <h1 style="text-align:center; font-size: 1.2rem; letter-spacing: 2px;">SYCA CENTER</h1>

        <div class="card" style="border-color: var(--blue);">
            <span class="section-label" style="color:var(--blue)">🚀 گزارش سریع موقعیت (صوتی/متنی)</span>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="status-input" placeholder="الان کجایی؟">
                <button class="btn-icon" onclick="startVoice('status-input', 'quick')">🎤</button>
                <button onclick="handleAI('quick')" style="background:var(--blue); border:none; padding:10px; border-radius:12px; color:white; cursor:pointer;">ثبت</button>
            </div>
            <div id="quick-chat-log" class="chat-container"></div>
        </div>

        <div id="daily-section">
            <span class="section-label" style="color:#71717a">📋 برنامه و خریدهای امروز</span>
            <div id="daily-list-content"></div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <span class="section-label">🧠 میز مشورت استراتژیک (صوتی/متنی)</span>
            <div style="display: flex; gap: 8px;">
                <textarea id="chat-input" rows="1" placeholder="مشورت با جمینای..."></textarea>
                <button class="btn-icon" onclick="startVoice('chat-input', 'deep')">🎤</button>
                <button onclick="handleAI('deep')" class="btn-main" style="width: auto; padding: 10px 20px;">ارسال</button>
            </div>
            <div id="deep-chat-log" class="chat-container"></div>
        </div>
    </div>

    <div id="page-strategy" class="page">
        <h1 style="text-align:center;">اهداف بلندمدت</h1>
        <div id="lt-list-detailed"></div>
    </div>

    <div id="page-settings" class="page">
        <h1 style="text-align:center;">تنظیمات سیستم</h1>
        <div class="card">
            <label>API Key (Gemini)</label>
            <input type="password" id="api-key-input" placeholder="AIza...">
            
            <label>⏰ بررسی وضعیت (هر X ساعت)</label>
            <select id="interval-check">
                <option value="1">۱ ساعت</option>
                <option value="2" selected>۲ ساعت</option>
                <option value="4">۴ ساعت</option>
            </select>

            <label>📊 فیدبک عملکرد (هر Y ساعت)</label>
            <select id="interval-feedback">
                <option value="2">۲ ساعت</option>
                <option value="4" selected>۴ ساعت</option>
                <option value="8">۸ ساعت</option>
            </select>

            <label>🌙 ساعت مرور شبانه</label>
            <input type="time" id="nightly-review-time" value="23:30">

            <button onclick="saveSettings()" class="btn-main" style="margin-top: 20px;">ذخیره تنظیمات</button>
            <button onclick="clearAll()" style="background:none; color:#ef4444; border:none; width:100%; margin-top:25px; font-size:0.7rem; cursor:pointer;">🗑️ پاکسازی کل داده‌ها و ریست</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="nav-home" class="active">🏠<br>امروز</div>
    <div onclick="showPage('strategy')" id="nav-strategy">🎯<br>استراتژی</div>
    <div onclick="showPage('settings')" id="nav-settings">⚙️<br>تنظیمات</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('syca_db')) || { 
        tasks: [], daily: [], logs: [], chatHistory: { quick: [], deep: [] }, 
        lastDate: new Date().toLocaleDateString(),
        settings: { key: "", checkInt: "2", feedInt: "4", nightTime: "23:30" } 
    };

    function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            db.chatHistory.quick = [];
            db.chatHistory.deep = [];
            db.lastDate = today;
            saveDB();
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'settings') loadSettingsUI();
        render();
    }

    function loadSettingsUI() {
        document.getElementById('api-key-input').value = db.settings.key;
        document.getElementById('interval-check').value = db.settings.checkInt;
        document.getElementById('interval-feedback').value = db.settings.feedInt;
        document.getElementById('nightly-review-time').value = db.settings.nightTime;
    }

    function saveSettings() {
        db.settings.key = document.getElementById('api-key-input').value;
        db.settings.checkInt = document.getElementById('interval-check').value;
        db.settings.feedInt = document.getElementById('interval-feedback').value;
        db.settings.nightTime = document.getElementById('nightly-review-time').value;
        saveDB();
        alert("تنظیمات ذخیره شد.");
    }

    async function handleAI(type) {
        const inputId = type === 'quick' ? 'status-input' : 'chat-input';
        const userText = document.getElementById(inputId).value;
        if(!userText || !db.settings.key) return;

        addMessage(type, 'user', userText);
        document.getElementById(inputId).value = "";

        const prompt = `Context: ${JSON.stringify(db.tasks)}. User (${type}): ${userText}. Respond very briefly and strategically in Persian. Use [COMMAND: {"action": "add_daily", "task": "..."}] if needed.`;

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.settings.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await r.json();
            const fullText = data.candidates[0].content.parts[0].text;
            const aiText = fullText.split('[COMMAND:')[0].trim();
            
            addMessage(type, 'ai', aiText);
            speak(aiText);
            processCommands(fullText);
        } catch(e) { addMessage(type, 'ai', "خطا در ارتباط."); }
    }

    function addMessage(type, role, text) {
        db.chatHistory[type].push({ role, text });
        if(db.chatHistory[type].length > 4) db.chatHistory[type].shift();
        saveDB();
        render();
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'fa-IR';
        window.speechSynthesis.speak(m);
    }

    function startVoice(inputId, type) {
        const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'fa-IR';
        rec.onresult = (e) => { 
            document.getElementById(inputId).value = e.results[0][0].transcript; 
            handleAI(type);
        };
        rec.start();
    }

    function processCommands(text) {
        const match = text.match(/\[COMMAND: (.*?)\]/);
        if(match) {
            const cmd = JSON.parse(match[1]);
            if(cmd.action === "add_daily") db.daily.unshift(cmd.task);
            saveDB();
            render();
        }
    }

    function saveDB() { localStorage.setItem('syca_db', JSON.stringify(db)); }

    function render() {
        ['quick', 'deep'].forEach(type => {
            const logDiv = document.getElementById(type + '-chat-log');
            if(logDiv) logDiv.innerHTML = db.chatHistory[type].map(m => `
                <div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${m.text}</div>
            `).join('');
            logDiv.scrollTop = logDiv.scrollHeight;
        });

        const dList = document.getElementById('daily-list-content');
        dList.innerHTML = db.daily.slice(0, 5).map(t => `<div class="task-item">${t}</div>`).join('');
        
        const ltList = document.getElementById('lt-list-detailed');
        if(ltList) ltList.innerHTML = db.tasks.map(t => `<div class="card"><b>${t.n}</b> (شانس: ${t.p}%)</div>`).join('');
    }

    function clearAll() { if(confirm("ریست کامل؟")) { localStorage.clear(); location.reload(); } }

    window.onload = () => { checkDailyReset(); render(); };
</script>
</body>
</html>
