<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v3.5 | Ambient Intelligence</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e; --text: #f4f4f5; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { display: flex; justify-content: space-around; background: var(--card); padding: 15px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #27272a; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #27272a; }
        .suggestion-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.1)); border: 1px solid var(--primary); }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; background: #000; border: 1px solid #27272a; border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; }
        .task-item { padding: 8px 0; border-bottom: 1px solid #27272a; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="content">
    <div id="page-home" class="page active">
        <h1 style="text-align:center; font-size: 1.2rem;">وضعیت جاری</h1>
        
        <div class="card suggestion-box" id="smart-suggestion">
            <div style="font-size: 0.7rem; color: var(--primary); margin-bottom: 5px;">📍 پیشنهاد ۱ ساعت آینده:</div>
            <div id="suggestion-text" style="font-size: 1rem; font-weight: bold;">در حال تحلیل موقعیت...</div>
        </div>

        <div class="card">
            <textarea id="user-input" rows="3" placeholder="مثلاً: الان فلان میدون هستم و کار نونوایی تموم شد..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="askSyca()">بپرس</button>
                <button onclick="startVoice()" style="background:#27272a; border:none; padding:15px; border-radius:15px; cursor:pointer;">🎤</button>
            </div>
        </div>

        <div id="daily-to-do">
            <h3>📋 لیست کارهای امروز</h3>
            <div id="daily-list-content"></div>
        </div>
    </div>

    <div id="page-strategy" class="page">
        <h1>اهداف بلند مدت</h1>
        <div id="lt-list-detailed"></div>
    </div>

    <div id="page-settings" class="page">
        <h1>تنظیمات</h1>
        <div class="card">
            <input type="password" id="api-key-input" placeholder="Gemini API Key">
            <button onclick="saveSettings()" class="btn-main" style="margin-top:10px;">ذخیره</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')">🏠<br>داشبورد</div>
    <div onclick="showPage('strategy')">🎯<br>اهداف</div>
    <div onclick="showPage('settings')">⚙️<br>تنظیمات</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('syca_db')) || { tasks: [], daily: [], logs: [], settings: { key: "" } };

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        render();
    }

    function saveSettings() {
        db.settings.key = document.getElementById('api-key-input').value;
        localStorage.setItem('syca_db', JSON.stringify(db));
        alert("ذخیره شد.");
    }

    function render() {
        const dList = document.getElementById('daily-list-content');
        dList.innerHTML = db.daily.map(t => `<div class="task-item">🔹 ${t}</div>`).join('');

        const ltList = document.getElementById('lt-list-detailed');
        ltList.innerHTML = db.tasks.map(t => `
            <div class="card">
                <b>${t.n}</b> (شانس: ${t.p}%)
                <div style="font-size:0.8rem; color:grey;">ریزکارها: ${t.subs ? t.subs.join(', ') : 'تعریف نشده'}</div>
            </div>
        `).join('');
    }

    async function askSyca() {
        const input = document.getElementById('user-input').value;
        const suggestionDiv = document.getElementById('suggestion-text');
        if(!db.settings.key) return alert("API Key!");

        suggestionDiv.innerText = "سایکا در حال تصمیم‌گیری...";

        const prompt = `
        You are Syca.
        Strategic Goals & Subtasks: ${JSON.stringify(db.tasks)}.
        Daily To-Do: ${JSON.stringify(db.daily)}.
        Current Context: ${input}.

        Task:
        1. Break down long-term goals if needed.
        2. Combine location/context with daily tasks (e.g., if near market, suggest grocery).
        3. Suggest exactly what to do for the NEXT 1 HOUR.
        4. Provide a SHORT summary for the screen.
        5. Use COMMANDS: [COMMAND: {"action": "add_daily", "task": "..."}] [COMMAND: {"action": "update_lt", "name": "...", "subs": ["sub1", "sub2"]}]
        6. Respond in Persian.
        `;

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.settings.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            const responseText = d.candidates[0].content.parts[0].text;
            
            const cleanText = responseText.split('[COMMAND:')[0].trim();
            suggestionDiv.innerText = cleanText;
            
            // خروجی صوتی
            speak(cleanText);
            
            processCommands(responseText);
            document.getElementById('user-input').value = "";
            render();
        } catch(e) { suggestionDiv.innerText = "خطا در تحلیل!"; }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'fa-IR'; // برای گوشی‌های سامسونگ معمولاً گوگل TTS فارسی را ساپورت می‌کند
        window.speechSynthesis.speak(msg);
    }

    function processCommands(text) {
        const matches = text.matchAll(/\[COMMAND: (.*?)\]/g);
        for (const match of matches) {
            try {
                const cmd = JSON.parse(match[1]);
                if(cmd.action === "add_daily") db.daily.push(cmd.task);
                if(cmd.action === "update_lt") {
                    const idx = db.tasks.findIndex(t => t.n === cmd.name);
                    if(idx > -1) db.tasks[idx].subs = cmd.subs;
                }
                localStorage.setItem('syca_db', JSON.stringify(db));
            } catch(e) {}
        }
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'fa-IR';
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; askSyca(); };
        rec.start();
    }

    window.onload = render;
</script>
</body>
</html>
