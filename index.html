<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v3.6 | Final Edition</title>
    <style>
        :root {
            --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e;
            --text: #f4f4f5; --text-dim: #71717a; --accent: #ec4899;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        /* Navigation Bar */
        nav {
            display: flex; justify-content: space-around; background: var(--card);
            padding: 12px 0; border-top: 1px solid #27272a; position: fixed; bottom: 0; width: 100%;
        }
        nav div { color: var(--text-dim); font-size: 0.75rem; cursor: pointer; text-align: center; transition: 0.3s; }
        nav div.active { color: var(--primary); font-weight: bold; transform: translateY(-2px); }

        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #27272a; }
        .suggestion-box { 
            background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.05)); 
            border: 1px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        textarea {
            width: 100%; background: #000; border: 1px solid #27272a; border-radius: 16px;
            padding: 15px; color: white; resize: none; margin-bottom: 12px; box-sizing: border-box; font-family: inherit;
        }
        .btn-main {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: var(--primary); color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        
        .task-item { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border-right: 3px solid var(--primary); }
        label { display: block; font-size: 0.8rem; color: var(--text-dim); margin: 15px 0 5px 0; }
        input, select { width: 100%; background: #000; border: 1px solid #27272a; padding: 12px; border-radius: 12px; color: white; box-sizing: border-box; }
        hr { border: 0; border-top: 1px solid #27272a; margin: 20px 0; }
    </style>
</head>
<body>

<div class="content">
    <div id="page-home" class="page active">
        <h1 style="text-align:center; font-size: 1.3rem; letter-spacing: 3px;">SYCA</h1>
        
        <div class="card suggestion-box">
            <div style="font-size: 0.7rem; color: var(--primary); margin-bottom: 8px; font-weight: bold;">📍 پیشنهاد هوشمند لحظه‌ای:</div>
            <div id="suggestion-text" style="font-size: 1rem; line-height: 1.5;">منتظر گزارش شما هستم...</div>
        </div>

        <div class="card">
            <textarea id="user-input" rows="3" placeholder="کجایی؟ چه کاری انجام شد؟"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="askSyca()">تحلیل و ثبت</button>
                <button onclick="startVoice()" style="background:#27272a; border:none; padding:15px; border-radius:16px; cursor:pointer; font-size:1.2rem;">🎤</button>
            </div>
        </div>

        <div id="daily-to-do">
            <h3 style="font-size: 1rem; margin-bottom: 10px;">📋 برنامه جاری</h3>
            <div id="daily-list-content"></div>
        </div>
    </div>

    <div id="page-strategy" class="page">
        <h1 style="text-align:center;">اهداف بلندمدت</h1>
        <div id="lt-list-detailed"></div>
    </div>

    <div id="page-settings" class="page">
        <h1 style="text-align:center;">تنظیمات</h1>
        <div class="card">
            <label>API Key (Gemini)</label>
            <input type="password" id="api-key-input" placeholder="AIza...">
            
            <hr>
            <label>بررسی وضعیت (هر چند ساعت؟)</label>
            <select id="interval-check">
                <option value="1">۱ ساعت</option>
                <option value="2" selected>۲ ساعت</option>
                <option value="4">۴ ساعت</option>
            </select>

            <label>فیدبک عملکرد (هر چند ساعت؟)</label>
            <select id="interval-feedback">
                <option value="2">۲ ساعت</option>
                <option value="4" selected>۴ ساعت</option>
                <option value="8">۸ ساعت</option>
            </select>

            <label>ساعت مرور شبانه</label>
            <input type="time" id="nightly-review-time" value="23:30">

            <button onclick="saveSettings()" class="btn-main" style="margin-top: 25px;">ذخیره تنظیمات</button>
            <button onclick="clearAll()" style="background:none; color:#ef4444; border:none; width:100%; margin-top:20px; font-size:0.7rem; cursor:pointer;">🗑️ پاکسازی کامل داده‌ها</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="nav-home" class="active">🏠<br>امروز</div>
    <div onclick="showPage('strategy')" id="nav-strategy">🎯<br>استراتژی</div>
    <div onclick="showPage('settings')" id="nav-settings">⚙️<br>تنظیمات</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('syca_db')) || { 
        tasks: [], daily: [], logs: [], 
        settings: { key: "", checkInt: 2, feedInt: 4, nightTime: "23:30" } 
    };

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('nav-' + p).classList.add('active');
        render();
    }

    function saveSettings() {
        db.settings.key = document.getElementById('api-key-input').value;
        db.settings.checkInt = document.getElementById('interval-check').value;
        db.settings.nightTime = document.getElementById('nightly-review-time').value;
        localStorage.setItem('syca_db', JSON.stringify(db));
        alert("تنظیمات با موفقیت ذخیره شد.");
    }

    function render() {
        // لیست کارهای روزانه
        const dList = document.getElementById('daily-list-content');
        dList.innerHTML = db.daily.length ? db.daily.map(t => `<div class="task-item">${t}</div>`).join('') : '<div style="color:grey; font-size:0.8rem;">هنوز کاری برای امروز تعریف نشده.</div>';

        // لیست اهداف بلندمدت
        const ltList = document.getElementById('lt-list-detailed');
        ltList.innerHTML = db.tasks.map(t => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b>${t.n}</b> <span style="color:var(--primary)">${t.p}%</span>
                </div>
                <div style="font-size:0.8rem; color:var(--text-dim)">
                    🔹 ریزکارها: ${t.subs && t.subs.length ? t.subs.join('، ') : 'در انتظار مشورت...'}
                </div>
            </div>
        `).join('');
    }

    async function askSyca() {
        const input = document.getElementById('user-input').value;
        const suggestionDiv = document.getElementById('suggestion-text');
        if(!db.settings.key) return alert("ابتدا API Key را وارد کنید.");

        suggestionDiv.innerText = "سایکا در حال تحلیل و هم‌افزایی...";

        const prompt = `
        You are Syca, an Ambient Strategic Assistant.
        Strategic Goals: ${JSON.stringify(db.tasks)}.
        Daily To-Do: ${JSON.stringify(db.daily)}.
        Context/Feedback: ${input}.

        MISSION:
        1. Mix location, context, and goals. 
        2. Break long-term goals into small subtasks.
        3. Give a 1-HOUR actionable advice.
        4. Response must be in Persian.
        5. COMMANDS: 
           [COMMAND: {"action": "add_daily", "task": "..."}]
           [COMMAND: {"action": "update_lt", "name": "...", "subs": ["sub1", "sub2"], "prob": 50}]
        `;

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.settings.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const d = await r.json();
            const fullText = d.candidates[0].content.parts[0].text;
            const cleanText = fullText.split('[COMMAND:')[0].trim();
            
            suggestionDiv.innerText = cleanText;
            speak(cleanText); // پخش صوتی
            
            processCommands(fullText);
            document.getElementById('user-input').value = "";
            render();
        } catch(e) { suggestionDiv.innerText = "اختلال در مغز مرکزی!"; }
    }

    function processCommands(text) {
        const matches = text.matchAll(/\[COMMAND: (.*?)\]/g);
        for (const match of matches) {
            try {
                const cmd = JSON.parse(match[1]);
                if(cmd.action === "add_daily") db.daily.unshift(cmd.task);
                if(cmd.action === "update_lt") {
                    const idx = db.tasks.findIndex(t => t.n === cmd.name);
                    if(idx > -1) {
                        if(cmd.subs) db.tasks[idx].subs = cmd.subs;
                        if(cmd.prob) db.tasks[idx].p = cmd.prob;
                    } else {
                        db.tasks.push({n: cmd.name, p: cmd.prob || 10, g: cmd.gain || 5, subs: cmd.subs || []});
                    }
                }
                localStorage.setItem('syca_db', JSON.stringify(db));
            } catch(e) {}
        }
    }

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fa-IR';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'fa-IR';
        rec.onresult = (e) => { 
            document.getElementById('user-input').value = e.results[0][0].transcript; 
            askSyca(); 
        };
        rec.start();
    }

    function clearAll() { if(confirm("تمام داده‌ها پاک شود؟")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        if(db.settings.key) document.getElementById('api-key-input').value = db.settings.key;
        render();
    };
</script>
</body>
</html>
