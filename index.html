<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v15 | AI-Bridge</title>
    <style>
        :root {
            --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e; --text: #f4f4f5;
            --blue: #3b82f6; --red: #ef4444; --green: #10b981; --amber: #f59e0b;
            --muted: #71717a; --border: #27272a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        nav {
            display: flex; justify-content: space-around;
            background: var(--card); padding: 12px 0;
            border-top: 1px solid var(--border);
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
        }
        nav div { color: var(--muted); font-size: 0.75rem; text-align: center; flex: 1; cursor: pointer; }
        nav div.active { color: var(--primary); font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; } .page.active { display: block; }
        h1 { text-align: center; font-size: 1.1rem; letter-spacing: 2px; margin: 10px 0 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; font-weight: bold; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; margin-bottom: 10px; font-family: inherit; font-size: 0.9rem; }
        .btn { border: none; padding: 10px 14px; border-radius: 12px; color: white; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); } .btn-blue { background: var(--blue); }
        .btn-icon { background: var(--border); border: none; padding: 12px; border-radius: 12px; color: white; font-size: 1.2rem; cursor: pointer; }
        .btn-icon.recording { background: var(--red); box-shadow: 0 0 15px var(--red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .input-row { display: flex; gap: 8px; align-items: flex-start; }
        .chat-container { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 90%; padding: 10px 12px; border-radius: 15px; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .user { align-self: flex-start; background: var(--border); border-right: 4px solid var(--blue); }
        .ai { align-self: flex-end; background: rgba(139, 92, 246, 0.1); border-left: 4px solid var(--primary); text-align: right; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; background: var(--green); color: white; margin-bottom: 10px; }
        .task-item { display: flex; align-items: center; gap: 10px; background: #000; padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; border: 1px solid var(--border); }
        .task-checkbox { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .task-checkbox.checked { background: var(--green); border-color: var(--green); color: white; }
        .task-text { flex: 1; font-size: 0.85rem; }
        .task-priority { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
        .priority-high { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .priority-medium { background: rgba(245, 158, 11, 0.2); color: var(--amber); }
        .priority-low { background: rgba(16, 185, 129, 0.2); color: var(--green); }
        .stats-row { display: flex; justify-content: space-around; font-size: 0.75rem; color: var(--muted); margin-top: 10px; text-align: center; }
        .stat-num { color: var(--text); font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="content">
    <div id="page-home" class="page active">
        <h1>SYCA CENTER</h1>
        <div class="card" style="border-color: var(--green);">
            <div class="status-badge">📊 تحلیل استراتژیک</div>
            <div id="strategic-summary" style="font-size: 0.85rem; color: #d4d4d8;">در انتظار اولین پیام...</div>
            <div id="mood-indicator" style="font-size: 0.75rem; color: var(--muted); margin-top: 8px;"></div>
        </div>
        <div class="card" style="border-color: var(--amber);">
            <label style="color:var(--amber)">🎯 لیست کارها</label>
            <div id="home-task-list"></div>
            <div class="stats-row" id="task-stats"></div>
        </div>
        <div class="card" style="border-color: var(--blue);">
            <label style="color:var(--blue)">🚀 گزارش سریع</label>
            <div class="input-row">
                <input type="text" id="status-input" placeholder="چه خبر؟">
                <button id="mic-quick" class="btn-icon" onclick="toggleMic('status-input', 'quick')">🎤</button>
                <button class="btn btn-blue" onclick="handleAI('quick')">ثبت</button>
            </div>
            <div id="quick-chat-log" class="chat-container"></div>
        </div>
        <div class="card">
            <label>🧠 میز مشورت</label>
            <div class="input-row">
                <textarea id="chat-input" rows="1" placeholder="گفتگو..."></textarea>
                <button id="mic-deep" class="btn-icon" onclick="toggleMic('chat-input', 'deep')">🎤</button>
                <button class="btn btn-primary" onclick="handleAI('deep')">ارسال</button>
            </div>
            <div id="deep-chat-log" class="chat-container"></div>
        </div>
    </div>

    <div id="page-strategy" class="page">
        <h1>🎯 مدیریت اهداف</h1>
        <div id="lt-list-detailed"></div>
    </div>

    <div id="page-settings" class="page">
        <h1>⚙️ تنظیمات</h1>
        <div class="card">
            <label>🔑 Gemini API Key</label>
            <input type="password" id="api-key-input">
            <button class="btn btn-primary" style="width:100%;" onclick="saveSettings()">💾 ذخیره</button>
            <button onclick="clearAll()" style="color:var(--red); background:none; border:none; width:100%; margin-top:20px; cursor:pointer;">🗑️ پاکسازی کل داده‌ها</button>
        </div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="nav-home" class="active">🏠<br>امروز</div>
    <div onclick="showPage('strategy')" id="nav-strategy">🎯<br>استراتژی</div>
    <div onclick="showPage('settings')" id="nav-settings">⚙️<br>تنظیمات</div>
</nav>

<script>
let db = JSON.parse(localStorage.getItem('syca_db')) || {
    tasks: [], logs: [], chatHistory: { quick: [], deep: [] },
    settings: { key: "", checkInt: "2", feedInt: "4", nightTime: "23:30" },
    lastSummary: "", lastMood: ""
};

let recognition = null;
let currentRecordingType = null;

function saveDB() { localStorage.setItem('syca_db', JSON.stringify(db)); }
function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function showPage(p) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.getElementById('nav-' + p).classList.add('active');
    if (p === 'settings') document.getElementById('api-key-input').value = db.settings.key;
    render();
}

function saveSettings() {
    db.settings.key = document.getElementById('api-key-input').value.trim();
    saveDB(); alert("ذخیره شد.");
}

function toggleMic(inputId, type) {
    const micBtn = document.getElementById('mic-' + type);
    if (recognition) { recognition.stop(); return; }
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return alert("خطای میکروفون");
    recognition = new SpeechRec();
    recognition.lang = 'fa-IR'; recognition.continuous = true;
    recognition.onstart = () => micBtn.classList.add('recording');
    recognition.onresult = (e) => {
        let t = ""; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
        document.getElementById(inputId).value = t;
    };
    recognition.onend = () => { micBtn.classList.remove('recording'); recognition = null; };
    recognition.start();
}

async function handleAI(type) {
    const inputId = type === 'quick' ? 'status-input' : 'chat-input';
    const userText = document.getElementById(inputId).value.trim();
    if (!userText || !db.settings.key) return;

    const timestamp = new Date().toLocaleTimeString('it-IT');
    const fullDate = new Date().toLocaleDateString('fa-IR');
    db.logs.push({ time: timestamp, text: userText });
    addMessage(type, 'user', `(${timestamp}) ${userText}`);
    document.getElementById(inputId).value = "";
    addMessage(type, 'ai', '⏳ ...');

    const prompt = `تو سیکا هستی، مربی استراتژیک. امروز ${fullDate} ساعت ${timestamp} است.
    گزارش کاربر: "${userText}"
    تاریخچه: ${JSON.stringify(db.logs.slice(-3))}
    پاسخ را دقیقاً در این فرمت JSON برگردان:
    {"reply": "جمله کوتاه و صمیمی", "mood": "حس کاربر در یک کلمه", "tasks": [{"n": "عنوان کار جدید", "p": "high|medium|low"}]}`;

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.settings.key}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        const rawText = data.candidates[0].content.parts[0].text;
        
        // استخراج هوشمند JSON
        const jsonMatch = rawText.match(/\{.*\}/s);
        const parsed = JSON.parse(jsonMatch ? jsonMatch[0] : rawText);

        db.chatHistory[type].pop();
        addMessage(type, 'ai', parsed.reply);
        db.lastSummary = parsed.reply;
        db.lastMood = parsed.mood;
        if(parsed.tasks) parsed.tasks.forEach(t => db.tasks.push({...t, id: Date.now()+Math.random(), done: false}));
        
        saveDB(); render();
        speak(parsed.reply);
    } catch (e) {
        db.chatHistory[type].pop();
        addMessage(type, 'ai', "خطا در پردازش. دوباره امتحان کنید.");
    }
}

function addMessage(type, role, text) {
    db.chatHistory[type].push({ role, text });
    if (db.chatHistory[type].length > 5) db.chatHistory[type].shift();
    render();
}

function toggleTask(id) {
    const t = db.tasks.find(x => x.id === id);
    if(t) { t.done = !t.done; saveDB(); render(); }
}

function speak(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t); m.lang = 'fa-IR';
    window.speechSynthesis.speak(m);
}

function render() {
    ['quick', 'deep'].forEach(type => {
        const log = document.getElementById(type + '-chat-log');
        if(log) log.innerHTML = db.chatHistory[type].map(m => `<div class="msg ${m.role === 'user' ? 'user' : 'ai'}">${escapeHtml(m.text)}</div>`).join('');
    });
    document.getElementById('strategic-summary').innerText = db.lastSummary || "منتظر گزارش...";
    document.getElementById('mood-indicator').innerText = db.lastMood ? `🎭 حس: ${db.lastMood}` : "";

    const activeTasks = db.tasks.filter(t => !t.done);
    document.getElementById('home-task-list').innerHTML = activeTasks.map(t => `
        <div class="task-item">
            <div class="task-checkbox" onclick="toggleTask(${t.id})"></div>
            <div class="task-text">${escapeHtml(t.n)}</div>
            <span class="task-priority priority-${t.p}">${t.p === 'high' ? '!!!' : '!'}</span>
        </div>
    `).join('');

    const doneCount = db.tasks.filter(t => t.done).length;
    document.getElementById('task-stats').innerHTML = `<div><span class="stat-num">${activeTasks.length}</span><br>فعال</div><div><span class="stat-num" style="color:var(--green)">${doneCount}</span><br>تمام</div>`;
}

function clearAll() { if(confirm("حذف همه داده‌ها؟")) { localStorage.clear(); location.reload(); } }
window.onload = render;
</script>
</body>
</html>
