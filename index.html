<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syca v4.5 | Ultimate Assistant</title>
    <style>
        :root { --primary: #8b5cf6; --bg: #0a0a0c; --card: #16161e; --text: #f4f4f5; --blue: #3b82f6; --user-msg: #27272a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        nav { display: flex; justify-content: space-around; background: var(--card); padding: 12px 0; border-top: 1px solid #27272a; position: fixed; bottom: 0; width: 100%; z-index: 100; }
        nav div { color: #71717a; font-size: 0.75rem; text-align: center; cursor: pointer; }
        nav div.active { color: var(--primary); font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; } .page.active { display: block; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #27272a; }
        input, textarea { width: 100%; background: #000; border: 1px solid #27272a; padding: 12px; border-radius: 12px; color: white; box-sizing: border-box; font-family: inherit; }
        .btn-icon { background: #27272a; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
        .chat-container { margin-top: 10px; max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; }
        .user { align-self: flex-start; background: var(--user-msg); border-right: 3px solid var(--primary); }
        .ai { align-self: flex-end; background: rgba(139, 92, 246, 0.1); border-left: 3px solid var(--primary); text-align: left; direction: ltr; }
        .ai-fa { align-self: flex-end; background: rgba(139, 92, 246, 0.1); border-left: 3px solid var(--primary); text-align: right; direction: rtl; }
        .suggestion-header { font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="content">
    <div id="page-home" class="page active">
        <h1 style="text-align:center; font-size: 1.1rem; margin-bottom: 20px;">SYCA AI</h1>

        <div class="card" style="border-color: var(--blue);">
            <div class="suggestion-header" style="color:var(--blue)">🚀 گزارش سریع موقعیت</div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="status-input" placeholder="کجایی؟">
                <button class="btn-icon" onclick="startVoice('status-input', 'quick')">🎤</button>
                <button onclick="handleAI('quick')" style="background:var(--blue); border:none; padding:10px; border-radius:12px; color:white;">ثبت</button>
            </div>
            <div id="quick-chat-log" class="chat-container"></div>
        </div>

        <div id="daily-section">
            <h3 style="font-size: 0.9rem; color: #71717a; margin-right: 10px;">📋 برنامه امروز</h3>
            <div id="daily-list-content" style="margin-bottom: 20px;"></div>
        </div>

        <div class="card">
            <div class="suggestion-header">🧠 میز مشورت استراتژیک</div>
            <div style="display: flex; gap: 8px;">
                <textarea id="chat-input" rows="1" placeholder="گفتگو با جمینای..."></textarea>
                <button class="btn-icon" onclick="startVoice('chat-input', 'deep')">🎤</button>
                <button onclick="handleAI('deep')" style="background:var(--primary); border:none; padding:10px; border-radius:12px; color:white;">ارسال</button>
            </div>
            <div id="deep-chat-log" class="chat-container"></div>
        </div>
    </div>

    <div id="page-strategy" class="page">
        <h1 style="text-align:center;">استراتژی</h1>
        <div id="lt-list-detailed"></div>
    </div>

    <div id="page-settings" class="page">
        <h1 style="text-align:center;">تنظیمات</h1>
        <div class="card" id="settings-fields"></div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="nav-home" class="active">🏠<br>امروز</div>
    <div onclick="showPage('strategy')" id="nav-strategy">🎯<br>استراتژی</div>
    <div onclick="showPage('settings')" id="nav-settings">⚙️<br>تنظیمات</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('syca_db')) || { 
        tasks: [], daily: [], logs: [], chatHistory: { quick: [], deep: [] }, lastDate: new Date().toLocaleDateString(),
        settings: { key: "", nightTime: "23:30" } 
    };

    function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            db.chatHistory.quick = [];
            db.chatHistory.deep = [];
            db.lastDate = today;
            localStorage.setItem('syca_db', JSON.stringify(db));
        }
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('nav div').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('nav-' + p).classList.add('active');
        if(p === 'settings') renderSettings();
        render();
    }

    async function handleAI(type) {
        const inputId = type === 'quick' ? 'status-input' : 'chat-input';
        const logId = type === 'quick' ? 'quick-chat-log' : 'deep-chat-log';
        const userText = document.getElementById(inputId).value;
        if(!userText || !db.settings.key) return;

        addMessage(type, 'user', userText);
        document.getElementById(inputId).value = "";

        const prompt = type === 'quick' 
            ? `Status: ${userText}. Give 1 short strategic advice (Persian).`
            : `Consultation: ${userText}. Strategize based on ${JSON.stringify(db.tasks)}. Persian. Use [COMMAND: {"action": "add_daily", "task": "..."}] if needed.`;

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${db.settings.key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await r.json();
            const aiText = data.candidates[0].content.parts[0].text.split('[COMMAND:')[0].trim();
            
            addMessage(type, 'ai', aiText);
            speak(aiText);
            
            if(data.candidates[0].content.parts[0].text.includes('[COMMAND:')) {
                processCommands(data.candidates[0].content.parts[0].text);
            }
        } catch(e) { addMessage(type, 'ai', "خطا در اتصال!"); }
    }

    function addMessage(type, role, text) {
        db.chatHistory[type].push({ role, text });
        if(db.chatHistory[type].length > 6) db.chatHistory[type].shift(); // نگه داشتن فقط ۳ مکالمه آخر برای خلاصه ماندن
        localStorage.setItem('syca_db', JSON.stringify(db));
        render();
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'fa-IR';
        window.speechSynthesis.speak(m);
    }

    function startVoice(inputId, type) {
        const rec = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        rec.lang = 'fa-IR';
        rec.onresult = (e) => { 
            document.getElementById(inputId).value = e.results[0][0].transcript; 
            handleAI(type);
        };
        rec.start();
    }

    function render() {
        ['quick', 'deep'].forEach(type => {
            const logDiv = document.getElementById(type + '-chat-log');
            if(logDiv) logDiv.innerHTML = db.chatHistory[type].map(m => `
                <div class="msg ${m.role === 'user' ? 'user' : 'ai-fa'}">${m.text}</div>
            `).join('');
            logDiv.scrollTop = logDiv.scrollHeight;
        });

        const dList = document.getElementById('daily-list-content');
        dList.innerHTML = db.daily.slice(0, 5).map(t => `<div style="padding:8px; border-bottom:1px solid #27272a; font-size:0.8rem;">🔹 ${t}</div>`).join('');
        
        const ltList = document.getElementById('lt-list-detailed');
        if(ltList) ltList.innerHTML = db.tasks.map(t => `<div class="card"><b>${t.n}</b> (${t.p}%)</div>`).join('');
    }

    function renderSettings() {
        document.getElementById('settings-fields').innerHTML = `
            <label>API Key</label><input type="password" id="api-key-input" value="${db.settings.key}">
            <button onclick="db.settings.key=document.getElementById('api-key-input').value; localStorage.setItem('syca_db', JSON.stringify(db)); alert('ذخیره شد');" class="btn-main">ذخیره</button>
        `;
    }

    function processCommands(text) {
        const match = text.match(/\[COMMAND: (.*?)\]/);
        if(match) {
            const cmd = JSON.parse(match[1]);
            if(cmd.action === "add_daily") db.daily.unshift(cmd.task);
            localStorage.setItem('syca_db', JSON.stringify(db));
            render();
        }
    }

    window.onload = () => { checkDailyReset(); render(); };
</script>
</body>
</html>
